; SeaForge local configuration template.
; Copy this file to config.ini and fill in real values locally.
; Do not commit config.ini.

[server]
; Tier B Hono server port.
PORT=8787

; Used by the Vite dev proxy when running the app locally.
SEAFORGE_SERVER_URL=http://localhost:8787

[palantir]
; Foundry stack URL, for example:
; https://your-stack.palantirfoundry.com
FOUNDRY_BASE_URL=

; Developer Console token, service token, or OAuth access token with scopes for:
; Ontology reads, Actions, Functions/AIP Logic, and any dataset/stream writes used by the demo.
FOUNDRY_TOKEN=

; RID of the Ontology backing SeaForge.
; Palantir REST v2 accepts either ontology API name or RID in the {ontology} path.
FOUNDRY_ONTOLOGY_API_NAME=
FOUNDRY_ONTOLOGY_RID=

; Optional generated OSDK package metadata. REST endpoints can also accept these
; as sdkPackageRid/sdkVersion query params for some action/query calls.
FOUNDRY_SDK_PACKAGE_RID=
FOUNDRY_SDK_VERSION=

; Required only if we create datasets programmatically instead of using existing ones.
FOUNDRY_PROJECT_RID=
FOUNDRY_DATASET_PARENT_FOLDER_RID=

; Optional if the generated OSDK/client setup requires explicit OAuth client configuration.
; Current local server code only requires FOUNDRY_TOKEN, but keep these here for Foundry app wiring.
FOUNDRY_CLIENT_ID=
FOUNDRY_CLIENT_SECRET=

[aip]
; Base URL used by the Tier B server to execute AIP Logic functions.
; Often this is the same Foundry stack base URL unless mentors give a more specific gateway URL.
AIP_LOGIC_BASE_URL=

; Bearer token for AIP Logic calls. Usually the same value as FOUNDRY_TOKEN if that token has AIP scopes.
AIP_LOGIC_TOKEN=

; AIP Logic exposed through the Ontology/API Gateway is represented as Query
; functions. We need query API names to execute them. RIDs are useful for
; inventory/debugging, but execution uses the query API name.
AIP_LOGIC_FUNCTION_RID=
AIP_KINEMATICS_QUERY_API_NAME=
AIP_IDENTITY_QUERY_API_NAME=
AIP_INTENT_QUERY_API_NAME=
AIP_COLLECTION_QUERY_API_NAME=
AIP_VISUAL_QUERY_API_NAME=
AIP_PROVENANCE_QUERY_API_NAME=
AIP_REVIEW_MEMORY_QUERY_API_NAME=

[foundry_objects]
; Object type API names from Ontology Manager / List Object Types.
; REST object/link endpoints use object type API names, not display names.
VESSEL_OBJECT_TYPE=
TRACK_OBJECT_TYPE=
OBSERVATION_OBJECT_TYPE=
AIS_MESSAGE_OBJECT_TYPE=
ANOMALY_OBJECT_TYPE=
CLAIM_OBJECT_TYPE=
EVIDENCE_ITEM_OBJECT_TYPE=
COLLECTION_ACTION_OBJECT_TYPE=
REVIEW_RULE_OBJECT_TYPE=
OPERATOR_DECISION_OBJECT_TYPE=
SOURCE_DOCUMENT_OBJECT_TYPE=

[foundry_links]
; Outgoing link type API names from Ontology Manager / objectType/outgoingLinkTypes.
VESSEL_HAS_TRACK_LINK=
TRACK_HAS_OBSERVATION_LINK=
OBSERVATION_DERIVED_FROM_AIS_LINK=
OBSERVATION_DERIVED_FROM_EVIDENCE_LINK=
ANOMALY_INVOLVES_TRACK_LINK=
ANOMALY_INVOLVES_VESSEL_LINK=
ANOMALY_IN_AOI_LINK=
CLAIM_EXPLAINS_ANOMALY_LINK=
SUPPORTS_LINK=
WEAKENS_LINK=
CONTRADICTS_LINK=
SOURCE_DOCUMENT_CONTAINS_EVIDENCE_LINK=
COLLECTION_ACTION_ADDRESSES_ANOMALY_LINK=
COLLECTION_ACTION_TESTS_CLAIM_LINK=
DECISION_ON_CLAIM_LINK=
DECISION_ON_COLLECTION_ACTION_LINK=
REVIEW_RULE_SCOPED_TO_AOI_LINK=
REVIEW_RULE_APPLIED_TO_ANOMALY_LINK=
APPLIES_TO_LINK=
REVIEWED_BY_LINK=
DERIVED_FROM_LINK=

[foundry_actions]
; Action type API names from Ontology Manager / List Action Types.
; REST apply-action uses API names. Keep RIDs separately if mentors provide them.
SAVE_OPERATOR_DECISION_ACTION=
SAVE_REVIEW_RULE_ACTION=
REQUEST_COLLECTION_ACTION=
UPDATE_CLAIM_STATUS_ACTION=
MERGE_VESSEL_IDENTITY_ACTION=
SAVE_OPERATOR_DECISION_ACTION_RID=
SAVE_REVIEW_RULE_ACTION_RID=
REQUEST_COLLECTION_ACTION_RID=
UPDATE_CLAIM_STATUS_ACTION_RID=
MERGE_VESSEL_IDENTITY_ACTION_RID=

[foundry_datasets]
; Dataset RIDs for raw and curated writes. Dataset REST endpoints use datasetRid.
RAW_AIS_DATASET=
RAW_DANTI_RESULTS_DATASET=
RAW_EXA_RESULTS_DATASET=
STREAM_AIS_LIVE=
STREAM_EDGE_OBSERVATION=
CURATED_AIS_MESSAGE_DATASET=
CURATED_OBSERVATION_DATASET=
CURATED_ANOMALY_DATASET=
CURATED_HYPOTHESIS_FEATURE_DATASET=
CURATED_EVIDENCE_ITEM_DATASET=
AIP_SPECIALIST_OUTPUTS_DATASET=

[external_sources_optional]
; Optional live source keys. The demo should work from fixtures without these.
AISHUB_API_KEY=
BARENTSWATCH_CLIENT_ID=
BARENTSWATCH_CLIENT_SECRET=
DANTI_BASE_URL=
DANTI_API_KEY=
EXA_API_KEY=
SHODAN_API_KEY=

[frontend_optional]
; Optional MapLibre tile style/source. Leave blank to use the local/fallback map style.
VITE_MAP_TILES_URL=
VITE_MAP_TILES_KEY=
