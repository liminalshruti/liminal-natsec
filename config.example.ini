; Liminal Custody local configuration template.
; Copy this file to config.ini and fill in real values locally.
; Do not commit config.ini. (config.ini is gitignored.)

[server]
; Tier B Hono server port.
PORT=8787

; Used by the Vite dev proxy when running the app locally.
SEAFORGE_SERVER_URL=http://localhost:8787

[palantir]
; Foundry stack URL, for example:
; https://your-stack.palantirfoundry.com
FOUNDRY_BASE_URL=

; Developer Console token, service token, or OAuth access token with scopes for:
; Ontology reads, Actions, Functions/AIP Logic, and any dataset/stream writes used by the demo.
FOUNDRY_TOKEN=

; RID of the Ontology backing SeaForge.
; Palantir REST v2 accepts either ontology API name or RID in the {ontology} path.
FOUNDRY_ONTOLOGY_API_NAME=
FOUNDRY_ONTOLOGY_RID=

; Optional generated OSDK package metadata. REST endpoints can also accept these
; as sdkPackageRid/sdkVersion query params for some action/query calls.
FOUNDRY_SDK_PACKAGE_RID=
FOUNDRY_SDK_VERSION=

; Required only if we create datasets programmatically instead of using existing ones.
FOUNDRY_PROJECT_RID=
FOUNDRY_DATASET_PARENT_FOLDER_RID=

; Optional if the generated OSDK/client setup requires explicit OAuth client configuration.
; Current local server code only requires FOUNDRY_TOKEN, but keep these here for Foundry app wiring.
FOUNDRY_CLIENT_ID=
FOUNDRY_CLIENT_SECRET=

[aip]
; Base URL used by the Tier B server to execute AIP Logic functions.
; Often this is the same Foundry stack base URL unless mentors give a more specific gateway URL.
AIP_LOGIC_BASE_URL=

; Bearer token for AIP Logic calls. Usually the same value as FOUNDRY_TOKEN if that token has AIP scopes.
AIP_LOGIC_TOKEN=

; AIP Logic exposed through the Ontology/API Gateway is represented as Query
; functions. We need query API names to execute them. RIDs are useful for
; inventory/debugging, but execution uses the query API name.
AIP_LOGIC_FUNCTION_RID=
AIP_KINEMATICS_QUERY_API_NAME=
AIP_IDENTITY_QUERY_API_NAME=
AIP_INTENT_QUERY_API_NAME=
AIP_COLLECTION_QUERY_API_NAME=
AIP_VISUAL_QUERY_API_NAME=
AIP_PROVENANCE_QUERY_API_NAME=
AIP_REVIEW_MEMORY_QUERY_API_NAME=

[ai_fallback]
; Optional live specialist fallback after AIP and before cache/fixtures.
; Uses @mariozechner/pi-ai with the OpenAI Codex provider. Keep disabled for
; deterministic demos unless you are intentionally testing live model behavior.
PI_AI_FALLBACK_ENABLED=false
PI_AI_PROVIDER=openai-codex
PI_AI_MODEL=gpt-5.4
PI_AI_AUTH_PATH=~/.pi/agent/auth.json
PI_AI_TIMEOUT_MS=20000
PI_AI_REASONING_EFFORT=minimal
PI_AI_TEXT_VERBOSITY=low

; Local-dev last resort only. Lets the server use the existing Codex OAuth
; session if Pi auth is missing. Requires a local ~/.codex/auth.json generated
; by Codex/OpenAI login. Do not use this path for production or demos.
CODEX_AUTH_FALLBACK_ENABLED=false
CODEX_AUTH_PATH=~/.codex/auth.json
CODEX_FALLBACK_MODEL=gpt-5.4

